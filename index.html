<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AudiosDB — Búsqueda por Teléfono</title>
  <meta name="description" content="Buscador de registros de audio por número de teléfono en la base de datos AUDIOSDB." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header>
    <div class="logo-icon">
      <img src="assets/logo-pixi.png" alt="AudiosDB Logo" />
    </div>
    <div class="header-text">
      <h1>AudiosDB Pro</h1>
      <p>Búsqueda inteligente y reproducción directa de registros de audio</p>
    </div>
    
    <div class="header-controls">
      <div class="badge-status" id="statusBadge">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Conectando...</span>
      </div>
      
      <button class="bag-btn" id="bagBtn" title="Ver bolsa de audios">
        <i class="bi bi-bag-fill"></i>
        <span>BOLSA DE AUDIOS</span>
        <span class="bag-count" id="bagCount">0</span>
      </button>
    </div>
  </header>

  <!-- ── Search ─────────────────────────────────────────────────── -->
  <div class="search-wrapper">
    <div class="search-input-group">
      <i class="bi bi-search search-icon"></i>
      <input
        type="search"
        id="searchInput"
        placeholder="Escribe el número de teléfono para buscar..."
        autocomplete="off"
        spellcheck="false"
        maxlength="20"
        aria-label="Buscar por teléfono"
      />
      <button class="clear-btn" id="clearBtn" title="Limpiar búsqueda" aria-label="Limpiar">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    
    <div class="filter-group">
      <i class="bi bi-calendar-event filter-icon"></i>
      <select id="monthSelect" class="month-select" aria-label="Filtrar por mes">
        <option value="TODOS">Todos los meses</option>
        <option value="ENERO">Enero</option>
        <option value="FEBRERO">Febrero</option>
        <option value="MARZO">Marzo</option>
        <option value="ABRIL">Abril</option>
        <option value="MAYO">Mayo</option>
        <option value="JUNIO">Junio</option>
        <option value="JULIO">Julio</option>
        <option value="AGOSTO">Agosto</option>
        <option value="SEPTIEMBRE">Septiembre</option>
        <option value="OCTUBRE">Octubre</option>
        <option value="NOVIEMBRE">Noviembre</option>
        <option value="DICIEMBRE">Diciembre</option>
      </select>
    </div>

    <div class="filter-group">
      <i class="bi bi-sort-down filter-icon"></i>
      <select id="sortSelect" class="sort-select" aria-label="Ordenar resultados">
        <option value="DEFAULT">Ordenar por defecto</option>
        <option value="GESTION">Gestión (Verdes primero)</option>
        <option value="PESO">Peso (Mayor a menor)</option>
      </select>
    </div>
  </div>

  <!-- ── Stats Bar ───────────────────────────────────────────────── -->
  <div class="stats-bar">
    <span class="results-count" id="resultsCount"></span>
    <div class="spinner" id="spinner"></div>
  </div>

  <!-- ── Content Area ────────────────────────────────────────────── -->
  <div id="contentArea" style="width:100%; max-width:1400px;"></div>

  <!-- ── Pagination ──────────────────────────────────────────────── -->
  <div class="pagination" id="pagination"></div>

  <!-- ── Bolsa de Audios Modal ────────────────────────────────────── -->
  <dialog id="bagModal" class="bag-modal">
    <div class="modal-header">
      <h2>Bolsa de Audios Seleccionados</h2>
      <button class="close-modal-btn" id="closeModalBtn" title="Cerrar bolsa">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="modal-body">
      <div id="modalEmptyState" class="modal-empty-state">
        <i class="bi bi-bag-x"></i>
        <p>No has seleccionado ningún audio todavía.</p>
      </div>
      <div id="modalListContainer" style="display: none;">
        <ul id="selectedList" class="selected-list"></ul>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="clearBagBtn">
        <i class="bi bi-trash"></i> Limpiar Todo
      </button>
      <button class="btn-primary" id="downloadAllBtn">
        <i class="bi bi-download"></i> DESCARGAR
      </button>
    </div>
  </dialog>

  <!-- Custom JS -->
  <script src="js/app.js"></script>
</body>
</html>
